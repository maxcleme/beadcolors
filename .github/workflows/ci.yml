name: Bead Colors CI

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: generation/go.mod
      - name: Unit Test
        run: |
          cd generation/ && go test ./...
      - name: Generation
        run: |
          cd generation/ && go run ./... ../raw ../gen
      - name: Commit
        if: "contains(github.ref, 'master') && !contains(toJSON(github.event.commits.*.msg), '[skip-ci]')"
        run: |
          set -e
          git config --global --add safe.directory /github/workspace
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add gen/
          git commit --allow-empty -m 'chore(ci): update' -m '[skip-ci]'
          git push origin master
      - name: Bump version and push tag
        id: tagging
        uses: anothrNick/github-tag-action@master
        if: "contains(github.ref, 'master') && !contains(toJSON(github.event.commits.*.msg), '[skip-ci]')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          tags: maxcleme/beadcolors:${{ steps.tagging.outputs.new_tag }},maxcleme/beadcolors:latest
          push: true
